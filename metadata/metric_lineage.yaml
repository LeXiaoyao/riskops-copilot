    metric_name_cn: 到期账户数
    ads_table: ads_postloan_dashboard_di
    dws_tables: [dws_customer_status_snapshot_di]
    dwd_tables: [dwd_due_plan_detail_di]
    ods_tables: [ods_repayment_plan]
